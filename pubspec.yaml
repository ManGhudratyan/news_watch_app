name: news_watch_app
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.2.4
  cupertino_icons: ^1.0.8
  reactive_forms: ^18.2.2
  persistent_bottom_nav_bar: ^6.2.1
  flutter_quill: ^11.5.0
  json_annotation: ^4.11.0
  json_serializable: ^6.13.1
  image_picker: ^1.2.1
  flutter_native_splash: ^2.4.7
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.13.0

  flutter_lints: ^6.0.0

flutter_native_splash:
  color: "#42a5f5"
  android_gravity: fill
  ios_content_mode: fill
  background_image: "assets/images/news_watch.png"
  background_image_dark: "assets/images/news_watch.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
